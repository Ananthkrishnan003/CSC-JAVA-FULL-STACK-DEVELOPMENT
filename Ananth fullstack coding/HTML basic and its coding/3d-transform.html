<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            height: 300px;
            color: yellow;
            background-color: blue;
            width: 300px;
            margin: 50px;
            border: 9px dashed orange;
            border-radius: 5px;
            font-style: bold;
            font-size: 30px;
        }

        p:hover{
            transform: rotatex(190deg);
        }
        p:hover{
            transform: rotateY(100deg);
        }
        p:hover{
            transform: rotatez(180deg);
        }
    </style>
</head>
<body>
    <p>
        Welcome to java full stack development in csc(DIJFD).
    </p>
</body>
</html>
