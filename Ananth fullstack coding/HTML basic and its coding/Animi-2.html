<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            height: 300px;
            width: 200px;
            background-color:greenyellow;
            color: violet;
            animation-name: Animie2;
            animation-duration: 9s;


        }

        @keyframes Animie2{

            0%{background-color: aqua;color: aliceblue;}

            25%{background-color: bisque;color:brown;}

            50%{background-color: aquamarine;color: black;}

            75%{background-color: chartreuse;color:turquoise;}

            100%{background-color:slateblue;color:springgreen;}
            

        }
    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quis rem qui reprehenderit odit fuga, at cupiditate voluptate quod explicabo libero harum cumque quas dolor. Nostrum rem eius voluptates tempore voluptatibus.</p>

</body>
</html>
