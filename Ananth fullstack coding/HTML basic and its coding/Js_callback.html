<body>
     <!-- Callbacks
    It is a function passed as an argument to another function.
    This technique allows a function to call another function 

    Example  -->

    <p id="demo"></p>
   

    <script>
    function display(msg) {
    document.getElementById("demo").innerHTML = msg;
    }
   
   

      function One() {
       display("Hellokkk");
       }

       function Two() {
      display("Goodbye");
       }

   

     
      
       One();
        
       
       Two();
    </script>


</body>
</html>
