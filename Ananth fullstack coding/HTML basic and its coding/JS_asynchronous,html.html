     <!-- Example - using setInterval()  -->
       <h1 id="demo"></h1>

    <script>
    setInterval(fun, 5000);

    function fun() {
    let d = new Date();
    document.getElementById("demo").innerHTML=
    d.getHours() + ":" +
    d.getMinutes() + ":" +
    d.getSeconds();
    }   
     </script>
