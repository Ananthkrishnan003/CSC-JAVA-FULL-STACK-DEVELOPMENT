<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            
            counter-reset:section;

        }

        h2::before
        {

            counter-increment:section;
            content: "section" counter(section)":";

        }
    </style>
</head>
<body>
    <h1>Counter</h1>
    <h2>html</h2>
    <h3>css</h3>
    <h4>java</h4>
    <h5>python</h5>
</body>
</html>
