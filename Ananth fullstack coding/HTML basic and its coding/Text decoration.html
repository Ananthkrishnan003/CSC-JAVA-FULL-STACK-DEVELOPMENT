    <title>Document</title>
    <style>
        h1{

            text-decoration: line-through;

        }

        }
        h3{
            text-align: right;
            text-decoration: overline;
            text-decoration-color: greenyellow;
            text-decoration-style: dashed;
            text-decoration-thickness: 5px;
        }

    </style>
</head>

</html>
